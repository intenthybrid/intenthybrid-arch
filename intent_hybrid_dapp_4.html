<style>
  :root{--bg:#e7e8e1;--bg2:#ffffff;--bg3:#edeee7;--bd:#c6cabe;--bd2:#aeb4a7;--tx:#14201a;--mut:#3c4a42;--mut2:#5b675e;--calm:#1f7a64;--warn:#856417;--dng:#a53a32;--brand:#2b5e50;--up:#1f7a64;--dn:#a53a32;--ink:#14201a;--line:#c6cabe;--accent:#2b5e50;--panel:#ffffff;--disp:'JetBrains Mono',ui-monospace,monospace;--body:'JetBrains Mono',ui-monospace,monospace;--mono:'JetBrains Mono',ui-monospace,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg) fixed;color:var(--tx);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .grid-bg{position:fixed;inset:-2px;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(47,103,89,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(47,103,89,.05) 1px,transparent 1px);background-size:48px 48px;animation:gp 28s linear infinite}
  @keyframes gp{to{background-position:48px 48px}}
  .orb{display:none}
  .orb.a{width:460px;height:460px;background:radial-gradient(circle,#2b5e50,transparent 68%);top:-140px;left:-110px;animation:d1 36s ease-in-out infinite alternate}
  .orb.b{width:420px;height:420px;background:radial-gradient(circle,#2b5e50,transparent 68%);bottom:-160px;right:-120px;animation:d2 42s ease-in-out infinite alternate}
  @keyframes d1{to{transform:translate(110px,80px)}}@keyframes d2{to{transform:translate(-100px,-90px)}}
  #bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
  .app{flex:1;min-width:0;position:relative;z-index:1;padding:20px 26px 60px;max-width:none;margin:0;width:100%}

  header{display:none}
  .nav{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:12px;height:60px;padding:0 16px}
  .brand{display:flex;align-items:center;gap:9px;cursor:pointer}.brand .nm{font-family:var(--disp);font-weight:700;font-size:16px}
  .tabs{display:flex;gap:2px;margin-left:4px;overflow-x:auto}
  .tabs a{font-family:var(--mono);font-size:12.5px;color:var(--mut);padding:8px 10px;border-radius:8px;white-space:nowrap}
  .tabs a:hover{color:var(--tx)}.tabs a.active{color:var(--brand);background:rgba(47,103,89,.08)}
  .right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .wbtn{font-family:var(--mono);font-size:12.5px;color:var(--tx);background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:8px 12px;cursor:pointer;white-space:nowrap}
  .wbtn:hover{border-color:var(--brand)}.wbtn.live{color:var(--brand);border-color:var(--brand)}
  .burger{display:none;background:none;border:1px solid var(--bd2);border-radius:8px;padding:7px 10px;color:var(--tx);cursor:pointer}

  h1{font-family:var(--disp);font-weight:600;font-size:24px;letter-spacing:-0.02em;margin:0}
  h2{font-family:var(--disp);font-weight:500;font-size:14px;margin:0 0 11px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--mut2);margin-bottom:7px}
  .lead{color:var(--mut);font-size:14px;max-width:660px}
  .card{background:#ffffff;border:1px solid var(--bd);border-radius:13px;padding:16px;box-shadow:0 1px 3px rgba(20,32,26,.05)}
  .grid{display:grid;gap:13px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
  .pagehead{padding:22px 0 16px}
  .btn{font-family:var(--mono);font-size:13px;border-radius:9px;padding:10px 14px;cursor:pointer;border:1px solid var(--bd2);background:var(--bg3);color:var(--tx);transition:.15s}
  .btn:hover{border-color:var(--brand)}.btn.primary{background:var(--brand);color:#f6f7f1;border-color:var(--brand);font-weight:600}.btn.primary:hover{filter:brightness(1.07)}
  .btn.sm{padding:7px 11px;font-size:12px}.btn:disabled{opacity:.55;cursor:default;filter:none}
  .up{color:var(--up)}.dn{color:var(--dn)}.mono{font-family:var(--mono)}
  .sel{background:var(--bg3);border:1px solid var(--bd2);border-radius:9px;padding:9px 11px;color:var(--tx);font-family:var(--mono);font-size:12.5px}

  .controls{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:13px}
  .search{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--bd2);border-radius:9px;padding:9px 13px;color:var(--tx);font-family:var(--mono);font-size:13px}
  .search:focus,.sel:focus{outline:none;border-color:var(--brand)}
  .cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
  .cat{font-family:var(--mono);font-size:12px;color:var(--mut);background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:6px 12px;cursor:pointer}
  .cat.on{color:var(--brand);border-color:var(--brand)}
  .mhead,.mli{display:grid;grid-template-columns:1.5fr 1fr 0.9fr 1.1fr;gap:10px;align-items:center;padding:11px 14px}
  .mhead{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);font-weight:500;border-bottom:1px solid var(--bd2)}
  .mli{border-bottom:1px solid var(--bd);cursor:pointer;transition:.12s}
  .mli:hover{background:rgba(47,103,89,.05)}
  .mli .pair{font-family:var(--mono);font-weight:500;font-size:13.5px}.mli .pair .q{color:var(--mut2);font-weight:400}
  .mli .tag{font-family:var(--mono);font-size:9.5px;color:var(--mut);border:1px solid var(--bd2);border-radius:5px;padding:1px 6px;margin-left:7px}
  .mli .px{font-family:var(--mono);font-size:13.5px;text-align:right}
  .mli .ch{font-family:var(--mono);font-size:13px;text-align:right}
  .crow{display:flex;align-items:center;justify-content:flex-end;gap:7px}
  .cbar{width:54px;height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}.cbar i{display:block;height:100%;border-radius:3px}
  .cval{font-family:var(--mono);font-size:12.5px;min-width:22px;text-align:right}
  .empty{text-align:center;color:var(--mut);font-size:13.5px;padding:30px}

  .crumb{font-family:var(--mono);font-size:12px;color:var(--mut);margin:18px 0 12px}.crumb a:hover{color:var(--brand)}
  .pxbar{display:flex;flex-wrap:wrap;gap:18px 26px;align-items:flex-end}
  .pxbar .big{font-family:var(--mono);font-weight:500;font-size:30px;line-height:1}
  .pxbar .sym{font-family:var(--disp);font-weight:600;font-size:20px}
  .pxbar .badge{font-family:var(--mono);font-size:10px;border:1px solid var(--bd2);border-radius:5px;padding:2px 7px;color:var(--mut);margin-left:8px}
  .kv{display:flex;flex-direction:column;gap:3px}.kv .k{font-family:var(--mono);font-size:10.5px;color:var(--mut2);text-transform:uppercase;letter-spacing:.04em}.kv .v{font-family:var(--mono);font-size:14px}
  .stat{background:var(--bg3);border-radius:10px;padding:12px}.stat .k{font-size:11px;color:var(--mut);margin-bottom:4px}.stat .v{font-family:var(--mono);font-weight:500;font-size:18px}
  .gauge-wrap{display:flex;flex-direction:column;align-items:center}
  svg.gauge{width:100%;max-width:200px;height:auto}
  .needle{transform-box:view-box;transform-origin:150px 150px;transition:transform .8s cubic-bezier(.34,.05,.3,1)}
  .gval{font-family:var(--mono);font-weight:500;font-size:30px;text-align:center;margin-top:-18px}
  .gstatus{font-family:var(--mono);font-size:12px;text-align:center;margin-top:4px}
  .brk{margin-top:6px}.brk .row{margin:9px 0}.brk .l{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--mut);margin-bottom:4px}
  .brk .bar{height:7px;border-radius:4px;background:var(--bg3);overflow:hidden}.brk .bar i{display:block;height:100%;border-radius:4px;transition:width .6s ease}
  .flow{display:flex;height:30px;border-radius:8px;overflow:hidden;font-family:var(--mono);font-size:11px;font-weight:600}
  .flow .b{background:linear-gradient(90deg,#2b5e50,#1f7a64);display:flex;align-items:center;padding:0 9px;color:#d4e6dc}
  .flow .s{background:linear-gradient(90deg,#a53a32,#7e342f);display:flex;align-items:center;justify-content:flex-end;padding:0 9px;color:#f2dcd8;margin-left:auto}
  .liqrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;padding:7px 0;border-bottom:1px solid var(--bd)}.liqrow:last-child{border-bottom:none}
  .dec-badge{font-family:var(--mono);font-weight:500;font-size:13px;padding:6px 12px;border-radius:8px;letter-spacing:.03em}
  .conf{margin-top:13px}.conf .l{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11.5px;color:var(--mut);margin-bottom:5px}.conf .bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}.conf .fill{height:100%;border-radius:3px;transition:width .6s ease}
  .blk{margin-top:12px}.blk .h{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut2);margin-bottom:4px}.blk .b{font-size:13.5px;line-height:1.55}
  .lnote{font-family:var(--mono);font-size:10.5px;color:var(--mut2);margin-top:11px;border-top:1px solid var(--bd);padding-top:8px}
  .alog{font-family:var(--mono);font-size:11.5px;color:var(--mut);line-height:1.7}
  .thinking{font-family:var(--mono);font-size:12.5px;color:var(--mut);display:flex;align-items:center;gap:8px}
  .spin{width:13px;height:13px;border:2px solid var(--bd2);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .anabox p{font-size:14px;line-height:1.65;color:var(--tx);margin:0 0 12px}
  .chatlog{display:flex;flex-direction:column;gap:9px;margin:10px 0;max-height:340px;overflow-y:auto}
  .msg{font-size:13.5px;line-height:1.55;padding:9px 12px;border-radius:11px;max-width:88%}
  .msg.u{align-self:flex-end;background:var(--bg3);border:1px solid var(--bd)}
  .msg.a{align-self:flex-start;background:rgba(47,103,89,.1);border:1px solid rgba(47,103,89,.25)}
  .chatbar{display:flex;gap:8px}.chatbar input{flex:1;background:var(--bg3);border:1px solid var(--bd2);border-radius:9px;padding:10px 13px;color:var(--tx);font-family:var(--body);font-size:13.5px}.chatbar input:focus{outline:none;border-color:var(--brand)}

<script>
function go(h){location.hash=h;}
function byId(i){return document.getElementById(i);}
const ICON={chat:'<svg viewBox="0 0 24 24"><path d="M21 11.5a8.5 8.5 0 0 1-12.6 7.4L3 21l2.1-5.4A8.5 8.5 0 1 1 21 11.5z"/></svg>',agent:'<svg viewBox="0 0 24 24"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V4.5M9.5 13h.01M14.5 13h.01M9 4.5h6"/></svg>',lock:'<svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>'};
function lockScreen(title,desc,icon){return '<div class="lockwrap"><div class="lockcard"><div class="lockic">'+icon+'</div><div class="lockbadge">'+ICON.lock+t('locked')+'</div><h2>'+title+'</h2><p>'+desc+'</p><button class="btn" disabled>'+t('comingsoon')+'</button></div></div>';}
function hudBase(){let g='';for(let x=0;x<=1000;x+=50)g+='<line x1="'+x+'" y1="0" x2="'+x+'" y2="420" stroke="#14201a" stroke-opacity=".05"/>';for(let y=0;y<=420;y+=42)g+='<line x1="0" y1="'+y+'" x2="1000" y2="'+y+'" stroke="#14201a" stroke-opacity=".05"/>';const br='<g stroke="#2b5e50" stroke-width="1.6" fill="none"><path d="M70 18 H18 V70"/><path d="M930 18 H982 V70"/><path d="M70 402 H18 V350"/><path d="M930 402 H982 V350"/></g>';return g+br;}
function hudFill(kind){let m='';if(kind==='wave'){let nodes='';for(let r=0;r<5;r++)for(let c=0;c<18;c++)nodes+='<circle cx="'+(60+c*52)+'" cy="'+(70+r*26)+'" r="2" fill="#14201a" fill-opacity=".16"/>';let sync='';for(let i=0;i<8;i++){const x=300+i*40;sync+='<circle cx="'+x+'" cy="150" r="5" fill="#2b5e50" fill-opacity=".55"/><line x1="'+x+'" y1="156" x2="'+x+'" y2="232" stroke="#2b5e50" stroke-opacity=".4" stroke-dasharray="2 3"/>';}m=nodes+sync+'<path d="M40 300 H360 L410 290 L450 220 L475 360 L510 400 L600 410 H960" fill="none" stroke="#14201a" stroke-opacity=".5" stroke-width="2.4"/>';}else if(kind==='radar'){const cx=790,cy=210;let rings='';[52,98,144,190].forEach(r=>rings+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#14201a" stroke-opacity=".12"/>');let sw='';for(let i=0;i<22;i++){const a=i/22*6.2832,rr=62+(i%4)*30;sw+='<circle cx="'+(cx+Math.cos(a)*rr).toFixed(1)+'" cy="'+(cy+Math.sin(a)*rr).toFixed(1)+'" r="3" fill="#14201a" fill-opacity=".2"/>';}m=rings+sw+'<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+190)+'" y2="'+cy+'" stroke="#2b5e50" stroke-opacity=".6" stroke-width="2"><animateTransform attributeName="transform" type="rotate" from="0 '+cx+' '+cy+'" to="360 '+cx+' '+cy+'" dur="6s" repeatCount="indefinite"/></line>';}else if(kind==='blocks'){let bars='';for(let i=0;i<16;i++){const x=70+i*56;bars+='<rect x="'+x+'" y="120" width="38" height="180" rx="4" fill="none" stroke="#14201a" stroke-opacity=".2"/><rect x="'+x+'" y="'+(120+(i%3)*44)+'" width="38" height="'+(180-(i%3)*44)+'" rx="4" fill="#2b5e50" fill-opacity=".13"/>';}m=bars+'<rect x="406" y="114" width="38" height="192" rx="4" fill="none" stroke="#2b5e50" stroke-opacity=".55" stroke-width="2.2"/>';}else if(kind==='chart'){const eth=[300,298,296,295,293,291,250,210,214,228,250,262,266],cr=[30,33,41,62,78,80,88,70,55,45,38,34,31];const X=i=>70+i/(eth.length-1)*860,Ye=v=>60+(1-(v-180)/140)*300,Yc=v=>60+(1-v/100)*300;const pe=eth.map((v,i)=>(i?'L':'M')+X(i).toFixed(0)+' '+Ye(v).toFixed(0)).join(' ');const pc=cr.map((v,i)=>(i?'L':'M')+X(i).toFixed(0)+' '+Yc(v).toFixed(0)).join(' ');m='<line x1="70" y1="'+Yc(75).toFixed(0)+'" x2="930" y2="'+Yc(75).toFixed(0)+'" stroke="#2b5e50" stroke-opacity=".4" stroke-dasharray="5 5"/><path d="'+pe+'" fill="none" stroke="#14201a" stroke-opacity=".5" stroke-width="2.4"/><path d="'+pc+'" fill="none" stroke="#2b5e50" stroke-opacity=".6" stroke-width="2.4" stroke-dasharray="6 4"/>';}else{let nodes='';for(let i=0;i<12;i++){const x=120+i*70,y=120+((i*53)%240);nodes+='<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="#2b5e50" fill-opacity=".5"><animate attributeName="fill-opacity" values=".2;.7;.2" dur="'+(3+i%4)+'s" repeatCount="indefinite"/></circle>';}m=nodes;}return '<svg viewBox="0 0 1000 420" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">'+hudBase()+m+'</svg>';}

/* light tech particles */
(function(){const c=byId('bg'),x=c.getContext('2d');const dpr=Math.min(devicePixelRatio||1,2);const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;let W,H,P=[],raf,m={x:-9999,y:-9999,on:false};const LINK=118*dpr,MR=150*dpr;
function size(){W=c.width=innerWidth*dpr;H=c.height=innerHeight*dpr;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';}
function init(){size();const n=Math.min(100,Math.floor(innerWidth*innerHeight/13000));P=[];for(let i=0;i<n;i++)P.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*0.12*dpr,vy:(Math.random()-.5)*0.12*dpr,r:(Math.random()*1.1+0.5)*dpr});}
function step(){x.clearRect(0,0,W,H);for(const p of P){p.x+=p.vx;p.y+=p.vy;if(m.on){const dx=m.x-p.x,dy=m.y-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;if(d<MR){const f=1-d/MR;p.x+=(dx/d)*f*0.6*dpr;p.y+=(dy/d)*f*0.6*dpr;p.x+=(-dy/d)*f*0.45*dpr;p.y+=(dx/d)*f*0.45*dpr;}}if(p.x<0)p.x+=W;if(p.x>W)p.x-=W;if(p.y<0)p.y+=H;if(p.y>H)p.y-=H;}
for(let i=0;i<P.length;i++){const a=P[i];for(let j=i+1;j<P.length;j++){const b=P[j],dx=a.x-b.x,dy=a.y-b.y;if(dx>LINK||dx<-LINK||dy>LINK||dy<-LINK)continue;const d=Math.sqrt(dx*dx+dy*dy);if(d<LINK){x.strokeStyle='rgba(47,103,89,'+(1-d/LINK)*0.12+')';x.lineWidth=dpr;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();}}}
if(m.on){const g=x.createRadialGradient(m.x,m.y,0,m.x,m.y,MR);g.addColorStop(0,'rgba(47,103,89,0.07)');g.addColorStop(1,'rgba(47,103,89,0)');x.fillStyle=g;x.beginPath();x.arc(m.x,m.y,MR,0,6.2832);x.fill();}
for(const p of P){let a=0.42;if(m.on){const d=Math.hypot(m.x-p.x,m.y-p.y);if(d<MR)a=0.42+(1-d/MR)*0.5;}x.beginPath();x.arc(p.x,p.y,p.r,0,6.2832);x.fillStyle='rgba(47,103,89,'+a+')';x.fill();}

function mb32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

function stats(sym){if(STATS[sym])return STATS[sym];const mk=mkOf(sym);const r=mb32(seed(sym));const px=mk.px0;

const Charts=[];
function sizeCanvas(cv){const r=cv.getBoundingClientRect();const dpr=Math.min(devicePixelRatio||1,2);cv.width=Math.max(60,Math.round(r.width*dpr));cv.height=Math.max(60,Math.round(r.height*dpr));cv._dpr=dpr;}
function addChart(id,getData,opts){const cv=byId(id);if(!cv)return;sizeCanvas(cv);const ch={cv,getData,opts};Charts.push(ch);drawChart(ch);}
function clearCharts(){Charts.length=0;}
function redrawCharts(){Charts.forEach(drawChart);}
function drawChart(ch){const cv=ch.cv,ctx=cv.getContext('2d'),W=cv.width,H=cv.height,dpr=cv._dpr||1,o=ch.opts;ctx.clearRect(0,0,W,H);const data=ch.getData();if(!data||data.length<2)return;
  const pL=3*dpr,pR=3*dpr,pT=7*dpr,pB=7*dpr;let mn,mx;
  if(o.min!=null){mn=o.min;mx=o.max;}else{mn=Math.min.apply(null,data);mx=Math.max.apply(null,data);const pad=(mx-mn)*0.14||(Math.abs(mn)*0.02||1);mn-=pad;mx+=pad;}
  const X=i=>pL+(i/(data.length-1))*(W-pL-pR),Y=v=>pT+(1-(v-mn)/((mx-mn)||1))*(H-pT-pB);
  const color=typeof o.color==='function'?o.color():o.color;
  if(o.thresholds)o.thresholds.forEach(t=>{if(t.v<mn||t.v>mx)return;const py=Y(t.v);ctx.save();ctx.setLineDash([4*dpr,4*dpr]);ctx.strokeStyle=t.color;ctx.lineWidth=dpr;ctx.beginPath();ctx.moveTo(pL,py);ctx.lineTo(W-pR,py);ctx.stroke();ctx.restore();});
  if(o.fill){const g=ctx.createLinearGradient(0,pT,0,H);g.addColorStop(0,color+'40');g.addColorStop(1,color+'00');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(X(0),Y(data[0]));for(let i=1;i<data.length;i++)ctx.lineTo(X(i),Y(data[i]));ctx.lineTo(X(data.length-1),H-pB);ctx.lineTo(X(0),H-pB);ctx.closePath();ctx.fill();}
  ctx.strokeStyle=color;ctx.lineWidth=2*dpr;ctx.lineJoin='round';ctx.lineCap='round';ctx.beginPath();ctx.moveTo(X(0),Y(data[0]));for(let i=1;i<data.length;i++)ctx.lineTo(X(i),Y(data[i]));ctx.stroke();
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(X(data.length-1),Y(data[data.length-1]),2.4*dpr,0,6.2832);ctx.fill();}
let crt;addEventListener('resize',()=>{clearTimeout(crt);crt=setTimeout(()=>{Charts.forEach(c=>{sizeCanvas(c.cv);drawChart(c);});},160);});

  else{decision='MONITOR';conf=41;action='No action needed. Keep monitoring '+b+'.';}

function startSim(sym){stopSim();SYM=sym;const s=stats(sym);simInt=setInterval(()=>{const c=s.cur;
  c.crowd=clampV(c.crowd+(Math.random()*2-1)*4+(s.crowd-c.crowd)*0.1);c.align=clampV(c.align+(Math.random()*2-1)*4+(c.crowd-c.align)*0.2);c.exits=clampV(c.exits+(Math.random()*2-1)*5+(c.crowd-c.exits)*0.2);c.conc=clampV(c.conc+(Math.random()*2-1)*3+(c.crowd-c.conc)*0.2);c.buyPct=Math.max(20,Math.min(80,Math.round(c.buyPct+(Math.random()*2-1)*4)));c.px=c.px*(1+(Math.random()*2-1)*0.0016);
  s.chh.push(c.crowd);if(s.chh.length>60)s.chh.shift();s.ph.push(c.px);if(s.ph.length>60)s.ph.shift();patchMarket(sym);},2200);}
function stopSim(){if(simInt){clearInterval(simInt);simInt=null;}}
function setBar(id,v){const e=byId(id);if(e){e.style.width=v+'%';e.style.background=rc(v);}const t=byId(id+'t');if(t)t.textContent=v+'%';}
function patchMarket(sym){const s=stats(sym),c=s.cur;const nd=byId('needle');if(nd)nd.style.transform='rotate('+((c.crowd-50)*1.8)+'deg)';const gv=byId('gVal');if(gv){gv.textContent=c.crowd;gv.style.color=rc(c.crowd);}const gs=byId('gStatus');if(gs){gs.textContent=rl(c.crowd);gs.style.color=rc(c.crowd);}setBar('bAlign',c.align);setBar('bExits',c.exits);setBar('bConc',c.conc);const pb=byId('pxBig');if(pb)pb.textContent='$'+fmtPx(c.px);const fb=byId('flowB'),fs=byId('flowS');if(fb){fb.style.width=c.buyPct+'%';fb.textContent=c.buyPct+'% buy';fs.textContent=(100-c.buyPct)+'% sell';}redrawCharts();}

function genWallet(addr){const r=mb32(seed(addr+'w'));const out=[];const n=3+Math.floor(r()*3);let guard=0;
  while(out.length<n&&guard++<40){const mk=MK[Math.floor(r()*MK.length)];if(out.find(p=>p.sym===mk.sym))continue;const s=stats(mk.sym);const side=r()<0.6?'Long':'Short';const lev=[2,3,5,10][Math.floor(r()*4)];const notional=Math.round(2+r()*42)*1000;const dist=(side==='Long'?-1:1)*(0.04+(1/lev)*0.55+r()*0.05);out.push({sym:mk.sym,base:mk.base,side,lev,notional,liq:s.px*(1+dist)});}
  return out;}
function walletRisk(){if(!state.wallet)return 0;return Math.max.apply(null,state.wallet.pos.map(p=>stats(p.sym).cur.crowd));}
function walletState(){if(!state.wallet)return 'No wallet connected.';const tot=state.wallet.pos.reduce((a,p)=>a+p.notional,0);
  return 'Read-only wallet '+state.wallet.addr+' ('+state.wallet.chain+'). Total notional '+fmtUSD(tot)+' across '+state.wallet.pos.length+' leveraged perp positions (simulated):\n'+
  state.wallet.pos.map(p=>{const s=stats(p.sym);const c=s.cur;return '- '+p.base+'USDT '+p.side+' '+p.lev+'x, notional '+fmtUSD(p.notional)+', liq '+fmtPx(p.liq)+', this market crowding '+c.crowd+'/100 ('+rl(c.crowd)+'), funding '+s.fund+'%, accounts '+s.longPct+'% long.';}).join('\n')+
  '\nPortfolio cascade risk is driven by the highest-crowding market the wallet is exposed to ('+walletRisk()+'/100).';}
function localWalletDecision(){if(!state.wallet)return {decision:'MONITOR',confidence:0,action:'Connect a wallet first.',situation:'No wallet connected.',reasoning:'',alert:null};
  const ranked=state.wallet.pos.map(p=>({p,c:stats(p.sym).cur.crowd})).sort((a,b)=>b.c-a.c);const worst=ranked[0];const v=worst.c;let decision,conf,action,alert=null;
  if(v>=78){decision='DERISK';conf=84;action='Cut leverage on your '+worst.p.base+' '+worst.p.side.toLowerCase()+' first, it sits in the most crowded market. Widen liquidation buffers across the book.';alert='Wallet exposed to extreme resonance via '+worst.p.base+'USDT.';}
  else if(v>=55){decision='WARN';conf=62;action='Your '+worst.p.base+' position is in an elevated-crowding market. Tighten stops and watch for synchronized exits.';}
  else{decision='MONITOR';conf=44;action='Portfolio cascade risk is low. Keep monitoring.';}
  const situation='Across '+state.wallet.pos.length+' positions, the riskiest is '+worst.p.base+'USDT '+worst.p.side+' '+worst.p.lev+'x in a market at '+v+'/100 crowding.';
  const reasoning='Cascade risk concentrates in the most crowded market you hold. '+(v>=78?'A synchronized unwind there could chain into your '+worst.p.lev+'x position.':v>=55?'Elevated alignment warrants caution.':'No market you hold is in the danger zone.');
  return {decision,confidence:conf,action,situation,reasoning,alert};}
function localWalletChat(q){if(!state.wallet)return 'Connect a wallet to analyze it.';const Q=q.toLowerCase();const r=walletRisk();const ranked=state.wallet.pos.map(p=>({p,c:stats(p.sym).cur.crowd})).sort((a,b)=>b.c-a.c);const w=ranked[0];
  if(/risk|danger|safe|cascade|liquidat/.test(Q))return 'Your portfolio cascade risk is '+r+'/100, driven by '+w.p.base+'USDT ('+w.p.side+' '+w.p.lev+'x) which is the most crowded market you hold. '+(r>=78?'De-risk that position first.':r>=55?'Tighten risk there.':'Overall risk is low.');
  if(/which|worst|most|biggest/.test(Q))return 'The most at-risk position is '+w.p.base+'USDT '+w.p.side+' '+w.p.lev+'x, in a market at '+w.c+'/100 crowding.';
  if(/recommend|should|do|reduce|hedge/.test(Q)){const d=localWalletDecision();return d.decision+': '+d.action;}
  return 'You hold '+state.wallet.pos.length+' leveraged positions; portfolio cascade risk '+r+'/100, worst exposure '+w.p.base+'USDT. (Risk analysis, not financial advice.)';}

function t(k){return (I18N[LANG]&&I18N[LANG][k])||I18N.en[k]||k;}
function langName(c){var m={};LANGS.forEach(function(l){m[l.c]=l.n;});return m[c]||c;}
function applyLang(){document.documentElement.lang=LANG;document.querySelectorAll('[data-i18n]').forEach(function(el){el.textContent=t(el.getAttribute('data-i18n'));});renderFoot();}
function setLang(c){LANG=c;applyLang();render();closeModal();}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
const I_wallet='<svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2.5"/><path d="M3 10h18M16.5 14.5h.01"/></svg>';
const I_google='<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M4 7l8 6 8-6"/></svg>';
const I_x='<svg viewBox="0 0 24 24"><path d="M4 4l16 16M20 4L4 20"/></svg>';
const I_gear='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.4 5.4l2.1 2.1M16.5 16.5l2.1 2.1M5.4 18.6l2.1-2.1M16.5 7.5l2.1-2.1"/></svg>';
const I_globe='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.6 2.6 2.6 15.4 0 18M12 3c-2.6 2.6-2.6 15.4 0 18"/></svg>';
const I_logout='<svg viewBox="0 0 24 24"><path d="M15 12H4M11 8l-4 4 4 4M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"/></svg>';
const XX=String.fromCharCode(10005), CK=String.fromCharCode(10003);
function authModal(mode){closeAcct();var isLogin=mode!=='signup';
  function tab(m){var on=(isLogin&&m==='login')||(!isLogin&&m==='signup');return '<button class="authtab'+(on?' on':'')+'" onclick="authModal('+Q+m+Q+')">'+t(m)+'</button>';}
  showModal('<div class="modal auth"><button class="xbtn" onclick="closeModal()">'+XX+'</button><div class="authtabs">'+tab('login')+tab('signup')+'</div><h3>'+t(isLogin?'auth_login_title':'auth_signup_title')+'</h3><p class="authsub">'+t('auth_sub')+'</p><button class="authbtn" onclick="authWith('+Q+'wallet'+Q+')">'+I_wallet+'<span>'+t('connect_wallet')+'</span></button><button class="authbtn" onclick="authWith('+Q+'google'+Q+')">'+I_google+'<span>'+t('continue_google')+'</span></button><button class="authbtn" onclick="authWith('+Q+'x'+Q+')">'+I_x+'<span>'+t('continue_x')+'</span></button>'+'<div class="author"><span>'+t('auth_or')+'</span></div><input class="authemail" id="authEmail" type="email" placeholder="'+t('email_ph')+'"><button class="authbtn primary" onclick="authEmail()">'+t('continue_email')+'</button><div class="authmsg" id="authMsg"></div>'+'<p class="authnote">'+t('auth_note')+'</p></div>');}
function authWith(m){if(m==='wallet'){connectWallet();return;}
  if(SB_READY){SB.auth.signInWithOAuth({provider:(m==='x')?'twitter':'google',options:{redirectTo:sbRedirect()}});return;}
  if(m==='google')state.user={method:'google',name:'Demo User',email:'demo.user@gmail.com'};else state.user={method:'x',name:'Demo User',email:'@demo_user'};
  closeModal();renderFoot();if((location.hash||'#/')==='#/wallet')render();}
function authEmail(){var inp=byId('authEmail');var email=inp?(inp.value||'').trim():'';var msg=byId('authMsg');
  if(!email||email.indexOf('@')<1){if(inp)inp.style.borderColor='var(--dng)';return;}
  if(SB_READY){if(msg){msg.style.color='var(--mut)';msg.textContent='...';}SB.auth.signInWithOtp({email:email,options:{emailRedirectTo:sbRedirect()}}).then(function(r){if(msg){msg.style.color=r.error?'var(--dng)':'var(--calm)';msg.textContent=r.error?r.error.message:t('email_sent');}});return;}
  state.user={method:'email',name:email.split('@')[0],email:email};closeModal();renderFoot();}
function signOut(){if(SB_READY){try{SB.auth.signOut();}catch(e){}}state.user=null;state.wallet=null;closeAcct();renderFoot();if((location.hash||'#/')==='#/wallet')render();}
function toggleAcct(){var m=byId('acctMenu');if(m)m.classList.toggle('open');}
function closeAcct(){var m=byId('acctMenu');if(m)m.classList.remove('open');}
function settingsModal(){closeAcct();var langs=LANGS.map(function(l){return '<button class="setlang'+(l.c===LANG?' on':'')+'" onclick="setLang('+Q+l.c+Q+')">'+l.n+(l.c===LANG?' '+CK:'')+'</button>';}).join('');
  showModal('<div class="modal settings"><div class="sethead"><h3>'+t('settings')+'</h3><button class="xbtn" onclick="closeModal()">'+XX+'</button></div><div class="setrow"><div class="setlabel">'+t('language')+'</div><div class="setlangs">'+langs+'</div></div><div class="setrow"><div class="setlabel">'+t('appearance')+'</div><div class="setval">'+t('light')+'</div></div><div class="setrow"><div class="setlabel">'+t('notifications')+'</div><label class="switch"><input type="checkbox" checked><span></span></label></div>'+(state.user?'<div class="setrow"><div class="setlabel">'+t('account')+'</div><div class="setval">'+escapeHtml(state.user.email)+'</div></div><button class="btn danger full" onclick="signOut();closeModal()">'+t('logout')+'</button>':'')+'</div>');}
function renderFoot(){var el=byId('sbfoot');if(!el)return;
  if(!state.user){el.innerHTML='<button class="wbtn primary" onclick="authModal('+Q+'login'+Q+')">'+t('login')+'</button><button class="wbtn ghost" onclick="authModal('+Q+'signup'+Q+')">'+t('signup')+'</button>';return;}
  var u=state.user;var ini=(u.email||u.name||'U').replace('@','').slice(0,1).toUpperCase();
  el.innerHTML='<div class="acct"><div class="acctmenu" id="acctMenu"><div class="amhead">'+escapeHtml(u.email||'')+'</div><button class="amitem" onclick="settingsModal()">'+I_gear+t('settings')+'</button><button class="amitem" onclick="settingsModal()">'+I_globe+t('language')+'<span class="amright">'+langName(LANG)+'</span></button><div class="amdiv"></div><button class="amitem danger" onclick="signOut()">'+I_logout+t('logout')+'</button></div><button class="acctbtn" onclick="toggleAcct()"><span class="avatar">'+ini+'</span><span class="acctinfo"><b>'+escapeHtml(u.name||'')+'</b><span>'+escapeHtml(u.email||'')+'</span></span>'+I_gear.replace('<svg','<svg class="gear"')+'</button></div>';}
function render(){stopSim();clearCharts();const h=location.hash||'#/';const sb=byId('sidebar');if(sb)sb.classList.remove('open');let isMarket=h.indexOf('#/m/')===0,html;
  if(h==='#/chat')html=lockScreen(t('chat'),t('chat_desc'),ICON.chat);
  else if(h==='#/agent')html=lockScreen(t('create_agent'),t('agent_desc'),ICON.agent);
  else if(isMarket)html=vMarket(decodeURIComponent(h.slice(4)));
  else html=(ROUTES[h]||vOverview)();
  const kind=h==='#/markets'?'blocks':h==='#/agents'?'radar':(h==='#/analyst'||isMarket)?'chart':'grid';
  byId('app').innerHTML='<div class="frame"><div class="hudbg">'+hudFill(kind)+'</div><div class="inner">'+html+'</div></div>';
  document.querySelectorAll('#nav a').forEach(a=>{const hr=a.getAttribute('href');a.classList.toggle('active',hr===h||(isMarket&&hr==='#/markets'));});window.scrollTo(0,0);
  if(h==='#/markets')renderList();
  if(isMarket){const sym=decodeURIComponent(h.slice(4));if(mkOf(sym)){const s=stats(sym);addChart('pChart',()=>s.ph,{color:()=>(s.ch>=0?'#1f7a64':'#a53a32'),fill:true});addChart('cChart',()=>s.chh,{color:()=>rc(s.cur.crowd),fill:true,min:0,max:100,thresholds:[{v:50,color:'#856417'},{v:75,color:'#a53a32'}]});startSim(sym);}}}
window.addEventListener('hashchange',render);
applyLang();render();sbInit();
addEventListener('click',function(e){var m=byId('acctMenu');if(m&&m.classList.contains('open')&&!(e.target.closest&&e.target.closest('.acct')))m.classList.remove('open');});
</script>
